name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Instalar dependencias
        run: npm ci
      - name: Rodar testes
        run: npx vitest run
      # Lint desabilitado temporariamente - eslint-plugin-react-hooks incompativel com globals v16
      # - name: Lint
      #   run: npm run lint
